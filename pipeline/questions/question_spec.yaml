# Phase 2 question set for the MA × SNAP vertical-slice pilot.
#
# Hand-authored per V2 §6.1; one entry per web-extractable field in the
# populated playbook (state_law.MA + agency_program.MA_SNAP), plus the
# production-document-grounded vendor facts flagged as
# manual_production_doc. The benchmark
# pipeline/benchmarks/MA_SNAP_benchmark.csv is auto-derived from this file
# and the playbooks; do not edit the benchmark by hand.
#
# Schema: pipeline/schemas/question_spec.schema.yaml.
# Closure: pipeline/questions/validate_question_spec.py.

# ============================================================
# Layer A — state_law.public_records_law.* (22 entries)
# ============================================================

- field_path: state_law.public_records_law.name
  question_template: "What is the common name of the public records law in {state}?"
  answer_format: agency_full_name
  max_length: 80
  source_pattern: "^https?://(www\\.)?(malegislature\\.gov|sec\\.state\\.ma\\.us|rcfp\\.org|nfoic\\.org)/"
  certification_threshold: medium
  example_good: "Massachusetts Public Records Law"
  example_bad: "The law that governs public records requests in Massachusetts is..."
  extraction_mode: web

- field_path: state_law.public_records_law.citation
  question_template: "What is the statutory citation for the public records law in {state}?"
  answer_format: statute_citation
  max_length: 60
  source_pattern: "^https?://(www\\.)?(malegislature\\.gov|sec\\.state\\.ma\\.us|rcfp\\.org|nfoic\\.org)/"
  certification_threshold: high
  example_good: "M.G.L. c. 66, § 10"
  example_bad: "Massachusetts has a public records law that allows citizens to..."
  extraction_mode: web

- field_path: state_law.public_records_law.response_deadline
  question_template: "How many business or calendar days does an agency in {state} have to respond to a public records request?"
  answer_format: deadline_days
  max_length: 25
  source_pattern: "^https?://(www\\.)?(malegislature\\.gov|sec\\.state\\.ma\\.us|rcfp\\.org|nfoic\\.org)/"
  certification_threshold: high
  example_good: "10 business days"
  example_bad: "10 business days, with a possible 20-day extension"
  extraction_mode: web

- field_path: state_law.public_records_law.response_deadline_citation
  question_template: "Which statute subsection holds the response deadline for public records requests in {state}?"
  answer_format: statute_citation
  max_length: 60
