  - vendor_name: West Publishing Corporation (a Thomson Reuters business)
    product_names:
      - ID Risk Analytics (IDRA)
      - CLEAR ID Confirm
    use_cases:
      - Identity-risk analytics over SNAP recipient population (heads of
        household) for fraud/identity-verification flagging
      - Aggregate risk dashboards displaying applicants binned high/medium/low
        risk
      - Configured anomaly alerts (e.g., shared home address, IP address,
        email address, deceased recipients)
    programs_covered: [SNAP]
    contract_or_order_ids:
      - "West Publishing SOW for IDRA (companion to Order Q-08237974)"
    pricing_terms: |
      Year 1 total $327,180:
        - IDRA Subscription (up to 30 users, incl. CLEAR ID Confirm for up to
          500,000 program participants/year): $214,980
        - One-time batch of ID Risk Analytics for current existing population
          (Est. 1.02M recipients) with SIU Briefing Report & Supporting
          Identity Risk Details: $112,200
      Years 2 and 3 annual subscription increases 5% year over year.
      Additional recipients above the threshold: $0.20/recipient.
    user_seats: 30
    batch_or_match_limits: |
      One-time batch of CIDC data: up to 1,020,000 recipients (then current
      SNAP population). Ongoing Recipient Validation: up to 500,000 matches
      per year. Risk Alerts: up to 30 configured alerts. IDRA users can
      download detailed risk-alert data with no limit.
    required_data_inputs:
      - One year of program data relating to applicants, recipients, and
        households (delivered within 30 days of contract start)
      - Reference descriptions for all reference codes in the data
      - Data dictionaries for all the data delivered to TR
      - Diagram of the relational model (primary/foreign key relations among
        source tables)
    named_deliverables:
      - Data Files Specification Document (DFSD) — describes entities, recipients,
        program data required, format detail, and methodology for use in the System
      - One-time batch ID Risk Analytics output for current existing SNAP
        population, plus a Summary Briefing Report (Special Investigations
        Unit) with supporting identity-risk details and a review session
      - Master Design Document (MDD) — output of the Project Requirements and
        Onboarding Process (PROP); structured technical/business fit-gap
        interviews used to configure dashboard components, thresholds, and
        identify data sources; must be formally accepted before configuration
        work begins
      - Training — one remote session per 20 users, up to 4 remote sessions;
        screen-specific customized user manuals; on-request training for
        major updates or substantive new functionality; embedded help and FAQs
      - Online User Manual for the System
    hosting_security_retention: |
      Hosting: Microsoft Azure platform and data centers, with industry-
      standard security protocols and ciphers. Connectivity via secure VPN
      from Customer's network. Backup: nightly encrypted file- and database-
      level backups via Azure Recovery Services Vault; AES-256 storage area
      network (SAN) at rest. Customer-defined data retention policy (provided
      within 45 days of contract start); default if absent is 30 days post-
      termination destruction. Security incident reporting to
      ISO@PonderaSolutions.com within 72 hours of unauthorized
      use/disclosure. Recommends Chromium-based browsers.
    timeline_milestones:
      - "Project initiation: contract execution"
      - "Begin PROP/Requirements Sessions: contract execution + 7 calendar days"
      - "Receive source program data: contract execution + 30 calendar days"
      - "Go-Live of standard SNAP IDRA nightly batch: receipt + acceptance of data + 30 days"
      - "Delivery of one-time batch results with SIU Report: receipt + acceptance of data + 45 days"
      - "Master Design Document: completion of IDRA PROP sessions + receipt of complete & validated source data (whichever later) + 15 calendar days"
      - "IDRA Go-Live: fully configured IDRA nightly batch OR real-time IDRA: completion of MDD OR receipt of complete & validated source data (whichever later) + 180 calendar days"
    help_desk:
      live_phone_hours: Mon-Fri 8:00 am - 5:00 pm Eastern (excl. federal holidays)
      electronic_ticketing: 24/7
      severity_levels:
        high: 4 hours              # complete loss of service / no workaround
        medium: 1 business day     # important features impaired but workaround
        low: 2 business days       # inconvenience / minor deficiency
    customer_responsibilities_excerpt:
      - Designate key project stakeholders within 7 calendar days of contract start
      - Assign technical resource within 7 calendar days of contract start
      - Maintain industry-standard general IT computer and application controls
      - Maintain current list of authorized decision-makers
